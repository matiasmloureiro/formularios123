<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Exemplo de Formulário</title>
</head>
<body>
<form id="form">
    <label for="nome">Nome</label>
    <input
            type="text"
            id="nome"
            name="nome"
            placeholder="Digite seu nome"
            required>
    <br/>
    <br/>
    <label for="senha">Senha</label>
    <input
            type="password"
            id="senha"
            name="senha"
            placeholder="Digite sua senha"
            required>

    <p>Qual é a sua cor favorita?</p>
    <div id="circulos">
        <span onclick="escolher('Vermelho')"  style="display:inline-block; width:60px; height:60px; border-radius:50%; background:red;    cursor:pointer; margin:8px;"></span>
        <span onclick="escolher('Azul')"      style="display:inline-block; width:60px; height:60px; border-radius:50%; background:blue;   cursor:pointer; margin:8px;"></span>
        <span onclick="escolher('Verde')"     style="display:inline-block; width:60px; height:60px; border-radius:50%; background:green;  cursor:pointer; margin:8px;"></span>
        <span onclick="escolher('Roxo')"      style="display:inline-block; width:60px; height:60px; border-radius:50%; background:purple; cursor:pointer; margin:8px;"></span>
        <span onclick="escolher('Laranja')"   style="display:inline-block; width:60px; height:60px; border-radius:50%; background:orange; cursor:pointer; margin:8px;"></span>
    </div>
    <br/>
    <br/>
    <input id="enviar" type="submit" value="Enviar">
</form>

<div id="resultado" style="display:none; margin-top:20px; padding:16px; border:1px solid #ccc; border-radius:8px;">
    <h3>Dados preenchidos:</h3>
    <p><strong>Nome:</strong> <span id="res-nome"></span></p>
    <p><strong>Senha:</strong> <span id="res-senha"></span></p>
    <p><strong>Cor favorita:</strong> <span id="res-cor"></span></p>
</div>

</body>
<script type="application/javascript">

    let corEscolhida = '';

    function escolher(cor) {
        corEscolhida = cor;
    }

    function dizer_ola(event) {
        event.preventDefault();

        let nome  = document.getElementById("nome").value;
        let senha = document.getElementById("senha").value;

        document.getElementById("res-nome").textContent  = nome;
        document.getElementById("res-senha").textContent = senha;
        document.getElementById("res-cor").textContent   = corEscolhida || 'Nenhuma';

        document.getElementById("resultado").style.display = "block";
    }

    document
        .getElementById('form')
        .addEventListener('submit', dizer_ola);

</script>
</html>
